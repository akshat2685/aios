version: '3'
services:
  qdrant:
    image: qdrant/qdrant:v1.25
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP__ENABLED=true
      - QDRANT__SERVICE__GRPC__ENABLED=true
      - QDRANT__DATABASE__LOCK__ENABLED=false

volumes:
  qdrant_storage: