version: '3.8'

services:
  spencer:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql://aios:aios@postgres:5432/aios_db
    volumes:
      - ./data:/app/data
      - ~/.cache/spencer:/root/.cache/spencer
    networks:
      - spencer-network
    depends_on:
      - qdrant
      - postgres

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=aios
      - POSTGRES_PASSWORD=aios
      - POSTGRES_DB=aios_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - spencer-network

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-storage:/qdrant/storage
    networks:
      - spencer-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - spencer-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - spencer-network

volumes:
  qdrant-storage:
  postgres-data:

networks:
  spencer-network:
    driver: bridge
