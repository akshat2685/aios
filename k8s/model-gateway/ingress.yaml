apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: model-gateway-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: model-gateway.aios.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: model-gateway
            port:
              number: 8080
