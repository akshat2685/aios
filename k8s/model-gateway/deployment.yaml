apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-gateway
  namespace: default
  labels:
    app: model-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: model-gateway
  template:
    metadata:
      labels:
        app: model-gateway
    spec:
      containers:
      - name: model-gateway
        image: aios/model-gateway:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: aios-config
        - secretRef:
            name: aios-secrets
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
