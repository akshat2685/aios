apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-pods
  namespace: default
  labels:
    app: agent-pods
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agent-pods
  template:
    metadata:
      labels:
        app: agent-pods
    spec:
      containers:
      - name: agent-pods
        image: aios/agent-pods:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: aios-config
        - secretRef:
            name: aios-secrets
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
