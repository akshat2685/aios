apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: memory-service-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: memory-service.aios.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: memory-service
            port:
              number: 8081
