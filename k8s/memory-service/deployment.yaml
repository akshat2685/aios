apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-service
  namespace: default
  labels:
    app: memory-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: memory-service
  template:
    metadata:
      labels:
        app: memory-service
    spec:
      containers:
      - name: memory-service
        image: aios/memory-service:latest
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: aios-config
        - secretRef:
            name: aios-secrets
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
