apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-bus
  namespace: default
  labels:
    app: event-bus
spec:
  replicas: 3
  selector:
    matchLabels:
      app: event-bus
  template:
    metadata:
      labels:
        app: event-bus
    spec:
      containers:
      - name: event-bus
        image: aios/event-bus:latest
        ports:
        - containerPort: 5672
        envFrom:
        - configMapRef:
            name: aios-config
        - secretRef:
            name: aios-secrets
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
