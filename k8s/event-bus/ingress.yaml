apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: event-bus-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: event-bus.aios.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: event-bus
            port:
              number: 5672
