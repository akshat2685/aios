apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vector-db-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: vector-db.aios.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vector-db
            port:
              number: 6333
