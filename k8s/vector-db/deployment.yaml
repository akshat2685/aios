apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector-db
  namespace: default
  labels:
    app: vector-db
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vector-db
  template:
    metadata:
      labels:
        app: vector-db
    spec:
      containers:
      - name: vector-db
        image: aios/vector-db:latest
        ports:
        - containerPort: 6333
        envFrom:
        - configMapRef:
            name: aios-config
        - secretRef:
            name: aios-secrets
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
